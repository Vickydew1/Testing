name: AccuKnox xBOM Scan

on:
  release:
    types: [published]

jobs:
  xbom-cbom-image:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Vickydew1/xbom-action@main
        with:
          bom-type: sbom
          path: "."
          token: ${{ secrets.ACCUKNOX_TOKEN }}
          endpoint: ${{ secrets.ACCUKNOX_ENDPOINT }}
          label: ${{ secrets.ACCUKNOX_LABEL }}
          project-name: Action
          project-classifier: application

      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify artifacts
        run: find artifacts -type f

      - name: Publish SBOM to GitHub Release
        uses: anchore/sbom-action/publish-sbom@v0
        with:
          sbom-artifact-match: ".*\\.json$"
