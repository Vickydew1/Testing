name: Test CBOM Image

on:
  push:
    branches: [main]

jobs:
  cbom-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        id: build
        run: |
          IMAGE="testapp:${{ github.sha }}"
          docker build -t "$IMAGE" .
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate CBOM from image
        id: cbom
        uses: Vickydew1/xbom-action@main
        with:
          bom-type:           cbom
          image:              ${{ steps.build.outputs.image }}
          token:              ${{ secrets.ACCUKNOX_TOKEN }}
          endpoint:           ${{ secrets.ACCUKNOX_ENDPOINT }}
          label:              ${{ secrets.ACCUKNOX_LABEL }}
          project-name:       Action
          project-classifier: application

      - name: Print outputs
        run: |
          echo "BOM file: ${{ steps.cbom.outputs.bom-file }}"
          echo "Upload status: ${{ steps.cbom.outputs.upload-status }}"
