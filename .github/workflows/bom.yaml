name: AccuKnox xBOM Scan

on:
  release:
    types: [published]

jobs:
  xbom-publish:
    runs-on: ubuntu-latest
    permissions:
      actions:  read
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run AccuKnox xBOM Scan
        uses: Vickydew1/xbom-action@main
        with:
          bom-type:           sbom
          path:               "."
          token:              ${{ secrets.ACCUKNOX_TOKEN }}
          endpoint:           ${{ secrets.ACCUKNOX_ENDPOINT }}
          label:              ${{ secrets.ACCUKNOX_LABEL }}
          project-name:       Action
          project-classifier: application

      - name: Download Workflow Artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify Downloaded Files
        run: |
          echo "=== DOWNLOADED ARTIFACTS ==="
          find artifacts -type f

      - name: Upload SBOM to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.json
