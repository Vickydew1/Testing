name: Test SBOM Filesystem (signed)

on:
  push:
    branches: [main]

jobs:
  sbom-fs-signed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate signed SBOM
        uses: Vickydew1/xbom-action@main
        with:
          bom-type:           sbom
          path:               "."
          sign:               true
          token:              ${{ secrets.ACCUKNOX_TOKEN }}
          endpoint:           ${{ secrets.ACCUKNOX_ENDPOINT }}
          label:              ${{ secrets.ACCUKNOX_LABEL }}
          project-name:       Action
          project-classifier: application

      - name: What does pkgscan actually support?
        shell: bash
        run: |
          knoxctl pkgscan scan --help 2>&1 | grep -i sign || echo "NO sign flags in help"

