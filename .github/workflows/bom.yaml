name: AccuKnox xBOM Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  xbom-scan:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
    
    - name: Build image
      id: build
      run: |
        IMAGE="myapp:${{ github.sha }}"
        docker build -t "$IMAGE" -f Dockerfile .   # ← match your exact filename
        echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
    
    - uses: accuknox/xbom-action@0.4
      with:
        bom-type:           cbom
        image:              ${{ steps.build.outputs.image }}
        token:              ${{ secrets.ACCUKNOX_TOKEN }}
        endpoint:           ${{ secrets.ACCUKNOX_ENDPOINT }}
        label:              ${{ secrets.ACCUKNOX_LABEL }}
        project-name:       Action
        project-classifier: application
