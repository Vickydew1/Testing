# =============================================================================
# AccuKnox SAST (Opengrep) — Google Cloud Build Pipeline
# Mirrors the accuknox/sast-scan-action GitHub Action.
# Scans the repo with Opengrep and uploads results to the AccuKnox CSPM panel.
# -----------------------------------------------------------------------------
# Secrets are pulled from Google Secret Manager:
#   accuknox-endpoint -> ACCUKNOX_ENDPOINT
#   accuknox-token    -> ACCUKNOX_TOKEN
#   accuknox-label    -> ACCUKNOX_LABEL
# If your secret IDs are different, override via the _*_SECRET substitutions.
# -----------------------------------------------------------------------------
# Cloud Build escaping rules used here:
#   ${_FOO}, ${BUILD_ID}, ${COMMIT_SHA}, ${PROJECT_ID}  -> resolved by Cloud Build
#   $$FOO, $${FOO}                                       -> passed through to bash
# =============================================================================

steps:
  - id: accuknox-sast-scan
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - ACCUKNOX_ENDPOINT
      - ACCUKNOX_TOKEN
      - ACCUKNOX_LABEL
    env:
      - SOFT_FAIL=${_SOFT_FAIL}
      - PIPELINE_ID=${BUILD_ID}
      - JOB_URL=https://console.cloud.google.com/cloud-build/builds/${BUILD_ID}?project=${PROJECT_ID}
      - REPO_URL=${_REPO_URL}
      - COMMIT_SHA=${COMMIT_SHA}
    args:
      - -c
      - |
        set -e

        # ---- Validate required inputs (sourced from Secret Manager) ----
        if [ -z "$$ACCUKNOX_ENDPOINT" ] || [ -z "$$ACCUKNOX_TOKEN" ] || [ -z "$$ACCUKNOX_LABEL" ]; then
          echo "ERROR: accuknox_endpoint, accuknox_token, and accuknox_label must be set in Secret Manager!"
          exit 1
        fi

        # ---- Download the AccuKnox ASPM Scanner ----
        echo "Downloading AccuKnox ASPM Scanner..."
        curl -sSL https://github.com/accuknox/aspm-scanner-cli/releases/download/v0.14.2/accuknox-aspm-scanner \
          -o /workspace/accuknox-aspm-scanner
        chmod +x /workspace/accuknox-aspm-scanner

        # ---- Resolve soft-fail flag ----
        SOFT_FAIL=$(echo "$$SOFT_FAIL" | tr -d ' \t\r\n')
        SOFT_FAIL_ARG=""
        if [ "$$SOFT_FAIL" = "true" ]; then
          SOFT_FAIL_ARG="--softfail"
        fi

        # ---- Fallback for manual builds (no trigger context) ----
        if [ -z "$$COMMIT_SHA" ]; then
          COMMIT_SHA="manual-$$PIPELINE_ID"
        fi
        if [ -z "$$REPO_URL" ]; then
          echo "WARNING: _REPO_URL substitution is empty. Set it in your trigger or build config."
        fi

        # ---- Run the SAST scan ----
        echo "Running AccuKnox SAST scan..."
        /workspace/accuknox-aspm-scanner scan --keep-results $$SOFT_FAIL_ARG sast \
          --command "." \
          --repo-url "$$REPO_URL" \
          --commit-sha "$$COMMIT_SHA" \
          --pipeline-id "$$PIPELINE_ID" \
          --job-url "$$JOB_URL" \
          --container-mode

# =============================================================================
# Pull values from Google Secret Manager
# Default secret IDs: accuknox-endpoint, accuknox-token, accuknox-label
# Override at build time if yours differ, e.g.:
#   --substitutions=_ACCUKNOX_TOKEN_SECRET=my-custom-token-secret
# =============================================================================
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_ACCUKNOX_ENDPOINT_SECRET}/versions/latest
      env: ACCUKNOX_ENDPOINT
    - versionName: projects/${PROJECT_ID}/secrets/${_ACCUKNOX_TOKEN_SECRET}/versions/latest
      env: ACCUKNOX_TOKEN
    - versionName: projects/${PROJECT_ID}/secrets/${_ACCUKNOX_LABEL_SECRET}/versions/latest
      env: ACCUKNOX_LABEL

substitutions:
  # Secret Manager secret IDs
  _ACCUKNOX_ENDPOINT_SECRET: ACCUKNOX_ENDPOINT
  _ACCUKNOX_TOKEN_SECRET: ACCUKNOX_TOKEN
  _ACCUKNOX_LABEL_SECRET: ACCUKNOX_LABEL
  # Plain substitutions
  _SOFT_FAIL: "true"
  _REPO_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
